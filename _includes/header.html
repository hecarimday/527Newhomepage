<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ site.baseurl }}/" class="site-header__logo">
      <img src='{{ "/assets/img/연구실 로고/nlp_logo5_black.png" | prepend: site.baseurl }}' alt="NLPLab logo"/>
      <span>{{ site.title }}</span>
    </a>
    <button class="site-nav__toggle" id="navToggle" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="siteNav">
      <ul>
        {% for link in site.navigation %}
          <li>
            <a href="{{ link.url | prepend: site.baseurl }}"
               {% if page.url contains link.url %}class="active"{% endif %}>
              {{ link.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>

<script>
  document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('siteNav').classList.toggle('open');
    this.classList.toggle('open');
  });
</script>
